services:
  mcp-movidesk:
    image: ghcr.io/raylann-lopes/mcp-movidesk-eagle:latest
    environment:
      - MOVIDESK_TOKEN=${MOVIDESK_TOKEN}
      - MCP_PORT=3000
    networks:
      - wize-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.mcp.rule=Host(`mcp.wizeflowsolutions.com`)"
        - "traefik.http.routers.mcp.entrypoints=websecure"
        - "traefik.http.routers.mcp.tls=true"
        - "traefik.http.routers.mcp.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.mcp.loadbalancer.server.port=3000"

networks:
  wize-net:
    external: true
